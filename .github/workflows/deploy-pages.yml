name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend/world_cup_stats_app
        run: flutter pub get

      - name: Build web
        working-directory: frontend/world_cup_stats_app
        run: |
          flutter build web \
            --release \
            --base-href /world-cup-stats-hub/ \
            --dart-define=API_BASE_URL=https://world-cup-stats-hub-api.onrender.com

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/world_cup_stats_app/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
